# Source of Truth for CoreChat application version.
#
# versionName
#   Semantic version (MAJOR.MINOR.PATCH) surfaced to users / Firebase App
#   Distribution / stores. Bump manually for each release.
#
# versionCodeOffset
#   Added to ${GITHUB_RUN_NUMBER} when the build runs on CI, producing a
#   monotonically-increasing versionCode across runs so Android recognises
#   each new APK as an upgrade. Bump this only when you need to force a
#   jump past an already-installed versionCode (e.g. migrating from a
#   non-CI release stream, or after resetting the workflow run counter).
#
# Local (non-CI) builds resolve versionCode to versionCodeOffset + 1 so
# repeated local installs still upgrade cleanly.
versionName=0.1.0
versionCodeOffset=0

name: Android配信 / Android Deploy

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'リリースノート（Release notes）'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: android-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject GEMINI_API_KEY into local.properties
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          : > local.properties
          if [ -n "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> local.properties
          else
            echo "::warning::GEMINI_API_KEY is empty; cloud fallback will be disabled"
          fi

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Compose release notes
        id: notes
        env:
          DISPATCH_NOTES: ${{ github.event.inputs.release_notes }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -n "${DISPATCH_NOTES}" ]; then
            NOTES="${DISPATCH_NOTES}"
          else
            SHORT_SHA="${COMMIT_SHA:0:7}"
            NOTES="${SHORT_SHA} ${COMMIT_MSG:-(manual build)}"
          fi
          {
            echo "notes<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: internal-testers
          testers: ${{ secrets.TESTERS_EMAILS }}
          file: android/app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: ${{ steps.notes.outputs.notes }}

name: Android配信 / Android Deploy

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'リリースノート（Release notes）'
        required: false
        default: ''
        type: string

permissions:
  contents: read

# Concurrency behaviour: if a new push arrives mid-distribution, the in-flight
# run is cancelled. Firebase App Distribution uses an atomic upload so no
# partial artefact is left on the server, but testers may receive two
# back-to-back notifications (old run cancelled, new run succeeded). This is
# intentional — we prefer "last write wins" over queuing stale releases.
concurrency:
  group: android-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight — required secrets
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          TESTER_GROUPS: ${{ secrets.TESTER_GROUPS }}
          TESTERS_EMAILS: ${{ secrets.TESTERS_EMAILS }}
        working-directory: .
        run: |
          missing=""
          [ -z "${FIREBASE_APP_ID}" ] && missing="${missing} FIREBASE_APP_ID"
          [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ] && missing="${missing} FIREBASE_SERVICE_ACCOUNT_JSON"
          if [ -n "${missing}" ]; then
            echo "::error::Required secret(s) missing:${missing}"
            echo "::error::Register them in Settings → Secrets and variables → Actions. See android/SETUP.md."
            exit 1
          fi
          # One of TESTER_GROUPS / TESTERS_EMAILS must be populated; otherwise
          # the Firebase CLI distribute call ends up with no recipient and
          # returns a confusing "entity not found" 404 late in the pipeline.
          if [ -z "${TESTER_GROUPS}" ] && [ -z "${TESTERS_EMAILS}" ]; then
            echo "::error::At least one of TESTER_GROUPS or TESTERS_EMAILS must be set."
            echo "::error::- TESTER_GROUPS: comma-separated Firebase group aliases (must exist in the console)."
            echo "::error::- TESTERS_EMAILS: comma-separated tester emails (auto-invited, no console setup needed)."
            exit 1
          fi
          if [ -n "${TESTER_GROUPS}" ]; then
            echo "Distributing to groups: ${TESTER_GROUPS}"
          fi
          if [ -n "${TESTERS_EMAILS}" ]; then
            echo "Distributing to individual testers (count: $(echo "${TESTERS_EMAILS}" | tr ',' '\n' | grep -c .))"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject GEMINI_API_KEY into local.properties
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          : > local.properties
          if [ -n "${GEMINI_API_KEY}" ]; then
            # printf (not echo) to avoid shell interpretation of backslashes or
            # leading `-` in unusual key values.
            printf 'GEMINI_API_KEY=%s\n' "${GEMINI_API_KEY}" >> local.properties
          else
            echo "::warning::GEMINI_API_KEY is empty; cloud fallback will be disabled"
          fi

      - name: Verify GEMINI_API_KEY injection (no value leak)
        # Logs only the injected value's length and a short sha256 prefix so we
        # can diagnose "AI利用不可" without ever exposing the secret itself.
        # Masked by GitHub's runner regardless, but we keep the prefix short to
        # avoid accidental disclosure if masking ever slips.
        run: |
          if grep -q '^GEMINI_API_KEY=..*' local.properties; then
            VAL=$(sed -n 's/^GEMINI_API_KEY=//p' local.properties | head -n1)
            LEN=${#VAL}
            HASH=$(printf '%s' "${VAL}" | sha256sum | cut -c1-12)
            echo "GEMINI_API_KEY injected (length=${LEN}, sha256-prefix=${HASH})"
            if [ "${LEN}" -lt 20 ]; then
              echo "::warning::GEMINI_API_KEY looks suspiciously short (length=${LEN}). Expected ~39 chars for an AI Studio key. Re-check the repository secret value (no surrounding quotes/whitespace)."
            fi
          else
            echo "::warning::GEMINI_API_KEY is NOT set in local.properties — cloud fallback will stay disabled and non-AICore devices will show 'AI利用不可'."
          fi

      - name: Restore debug keystore from Secret
        # A fixed debug keystore keeps the APK signing certificate constant across
        # CI runs. Without it, AGP auto-generates ~/.android/debug.keystore on each
        # ubuntu-latest runner, the signing cert differs between builds, and Android
        # refuses to upgrade an already-installed APK with
        # INSTALL_FAILED_UPDATE_INCOMPATIBLE. See android/SETUP.md §3.2.
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
        shell: bash
        run: |
          # pipefail: propagate non-zero exit through `| base64 -d`. errexit: fail fast
          # on any later command so we never proceed to assembleDebug with a broken
          # keystore (would silently auto-generate a fresh cert and defeat the fix).
          set -euo pipefail
          if [ -z "${DEBUG_KEYSTORE_B64}" ]; then
            echo "::error::DEBUG_KEYSTORE_B64 is not set. Without it every CI build ships a different signing cert and testers will hit INSTALL_FAILED_UPDATE_INCOMPATIBLE. See android/SETUP.md §3.2."
            exit 1
          fi
          mkdir -p app/debug
          if ! printf '%s' "${DEBUG_KEYSTORE_B64}" | base64 -d > app/debug/corechat-debug.keystore; then
            echo "::error::base64 decode failed. Ensure DEBUG_KEYSTORE_B64 is valid base64 with no line breaks or BOM."
            exit 1
          fi
          if [ ! -s app/debug/corechat-debug.keystore ]; then
            echo "::error::Decoded keystore is empty."
            exit 1
          fi
          # Explicitly check keytool's exit code — a mismatched alias/password produces
          # a non-zero exit with no SHA-1 in stdout and would otherwise sail through to
          # the "cert SHA-1 prefix: ..." log, causing a confusing assembleDebug failure
          # further down.
          if ! keytool -list -keystore app/debug/corechat-debug.keystore \
                  -storepass "${DEBUG_KEYSTORE_PASSWORD:-android}" \
                  -alias "${DEBUG_KEY_ALIAS:-androiddebugkey}" > /tmp/keystore_check.txt 2>&1; then
            echo "::error::keytool -list failed. Check DEBUG_KEYSTORE_PASSWORD / DEBUG_KEY_ALIAS against the keystore generated in SETUP.md §3.2."
            cat /tmp/keystore_check.txt
            exit 1
          fi
          SHA1=$(grep -oE '[0-9A-F]{2}(:[0-9A-F]{2}){19}' /tmp/keystore_check.txt | head -n1 || true)
          echo "Debug keystore restored (cert SHA-1 prefix: ${SHA1:0:17}...)"

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Lint (debug)
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble debug APK
        # GITHUB_RUN_NUMBER feeds into versionCode (see android/version.properties +
        # android/app/build.gradle.kts) so every CI build ships a strictly greater
        # versionCode than the previous one. Without this, Android refuses to
        # upgrade an already-installed APK and Firebase distributes what looks like
        # the same build to testers.
        #
        # DEBUG_KEYSTORE_* envs are consumed by the `signingConfigs.debug` block in
        # app/build.gradle.kts. Without them, Gradle falls back to the defaults
        # (android/androiddebugkey/android); passing them explicitly lets teams
        # rotate passwords without editing build files.
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Resolve versioned APK path
        id: apk
        # Filename is stamped with versionName + versionCode by the build script.
        # We discover it here instead of hardcoding so a single source-of-truth
        # (version.properties) can change versionName without breaking the workflow.
        run: |
          APK_FILE=$(ls app/build/outputs/apk/debug/corechat-v*.apk 2>/dev/null | head -n1)
          if [ -z "${APK_FILE}" ]; then
            echo "::error::No versioned APK produced under app/build/outputs/apk/debug/. Check the assemble step output and android/app/build.gradle.kts output naming."
            ls -la app/build/outputs/apk/debug/ || true
            exit 1
          fi
          APK_NAME=$(basename "${APK_FILE}")
          echo "name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "workspace_path=android/app/build/outputs/apk/debug/${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "Resolved APK: ${APK_NAME}"

      - name: Verify APK signing certificate fingerprint
        # Prints the APK's signing cert SHA-1 so we can eyeball it against prior
        # runs. Any drift indicates the DEBUG_KEYSTORE_B64 Secret was rotated and
        # testers will need to reinstall this once. See android/SETUP.md §3.2 / §6.
        shell: bash
        run: |
          set -euo pipefail
          APKSIGNER=$(find "${ANDROID_HOME}" -name apksigner -type f 2>/dev/null | sort -V | tail -n1 || true)
          if [ -z "${APKSIGNER}" ]; then
            # Fail instead of warn: this step is the only automated check that the
            # DEBUG_KEYSTORE_B64 Secret took effect. A silent skip defeats the purpose
            # of restoring the keystore in the first place.
            echo "::error::apksigner not found under ANDROID_HOME. Install Android SDK build-tools or set ANDROID_HOME correctly."
            exit 1
          fi
          "${APKSIGNER}" verify --print-certs "app/build/outputs/apk/debug/${{ steps.apk.outputs.name }}" | tee /tmp/apk_certs.txt
          SHA1=$(grep -oE 'SHA-1 digest: [0-9a-f]{40}' /tmp/apk_certs.txt | head -n1 | awk '{print $3}' || true)
          if [ -z "${SHA1}" ]; then
            echo "::error::Could not parse SHA-1 from apksigner output — APK may be unsigned."
            exit 1
          fi
          echo "APK signing cert SHA-1: ${SHA1}"

      - name: Compose release notes
        id: notes
        env:
          DISPATCH_NOTES: ${{ github.event.inputs.release_notes }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -n "${DISPATCH_NOTES}" ]; then
            NOTES="${DISPATCH_NOTES}"
          else
            SHORT_SHA="${COMMIT_SHA:0:7}"
            NOTES="${SHORT_SHA} ${COMMIT_MSG:-(manual build)}"
          fi
          {
            echo "notes<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.workspace_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload lint report as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: android/app/build/reports/lint-results-debug.html
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # Both groups and testers are optional — preflight already enforces
          # that at least one is set. Unset values become empty strings, which
          # the Firebase CLI treats as "no filter on this dimension".
          groups: ${{ secrets.TESTER_GROUPS }}
          testers: ${{ secrets.TESTERS_EMAILS }}
          file: ${{ steps.apk.outputs.workspace_path }}
          releaseNotes: ${{ steps.notes.outputs.notes }}

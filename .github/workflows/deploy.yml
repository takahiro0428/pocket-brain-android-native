name: Android配信 / Android Deploy

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'リリースノート（Release notes）'
        required: false
        default: ''
        type: string

permissions:
  contents: read

# Concurrency behaviour: if a new push arrives mid-distribution, the in-flight
# run is cancelled. Firebase App Distribution uses an atomic upload so no
# partial artefact is left on the server, but testers may receive two
# back-to-back notifications (old run cancelled, new run succeeded). This is
# intentional — we prefer "last write wins" over queuing stale releases.
concurrency:
  group: android-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight — required secrets
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          TESTER_GROUPS: ${{ secrets.TESTER_GROUPS }}
          TESTERS_EMAILS: ${{ secrets.TESTERS_EMAILS }}
        working-directory: .
        run: |
          missing=""
          [ -z "${FIREBASE_APP_ID}" ] && missing="${missing} FIREBASE_APP_ID"
          [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ] && missing="${missing} FIREBASE_SERVICE_ACCOUNT_JSON"
          if [ -n "${missing}" ]; then
            echo "::error::Required secret(s) missing:${missing}"
            echo "::error::Register them in Settings → Secrets and variables → Actions. See android/SETUP.md."
            exit 1
          fi
          # One of TESTER_GROUPS / TESTERS_EMAILS must be populated; otherwise
          # the Firebase CLI distribute call ends up with no recipient and
          # returns a confusing "entity not found" 404 late in the pipeline.
          if [ -z "${TESTER_GROUPS}" ] && [ -z "${TESTERS_EMAILS}" ]; then
            echo "::error::At least one of TESTER_GROUPS or TESTERS_EMAILS must be set."
            echo "::error::- TESTER_GROUPS: comma-separated Firebase group aliases (must exist in the console)."
            echo "::error::- TESTERS_EMAILS: comma-separated tester emails (auto-invited, no console setup needed)."
            exit 1
          fi
          if [ -n "${TESTER_GROUPS}" ]; then
            echo "Distributing to groups: ${TESTER_GROUPS}"
          fi
          if [ -n "${TESTERS_EMAILS}" ]; then
            echo "Distributing to individual testers (count: $(echo "${TESTERS_EMAILS}" | tr ',' '\n' | grep -c .))"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject GEMINI_API_KEY into local.properties
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          : > local.properties
          if [ -n "${GEMINI_API_KEY}" ]; then
            # printf (not echo) to avoid shell interpretation of backslashes or
            # leading `-` in unusual key values.
            printf 'GEMINI_API_KEY=%s\n' "${GEMINI_API_KEY}" >> local.properties
          else
            echo "::warning::GEMINI_API_KEY is empty; cloud fallback will be disabled"
          fi

      - name: Verify GEMINI_API_KEY injection (no value leak)
        # Logs only the injected value's length and a short sha256 prefix so we
        # can diagnose "AI利用不可" without ever exposing the secret itself.
        # Masked by GitHub's runner regardless, but we keep the prefix short to
        # avoid accidental disclosure if masking ever slips.
        run: |
          if grep -q '^GEMINI_API_KEY=..*' local.properties; then
            VAL=$(sed -n 's/^GEMINI_API_KEY=//p' local.properties | head -n1)
            LEN=${#VAL}
            HASH=$(printf '%s' "${VAL}" | sha256sum | cut -c1-12)
            echo "GEMINI_API_KEY injected (length=${LEN}, sha256-prefix=${HASH})"
            if [ "${LEN}" -lt 20 ]; then
              echo "::warning::GEMINI_API_KEY looks suspiciously short (length=${LEN}). Expected ~39 chars for an AI Studio key. Re-check the repository secret value (no surrounding quotes/whitespace)."
            fi
          else
            echo "::warning::GEMINI_API_KEY is NOT set in local.properties — cloud fallback will stay disabled and non-AICore devices will show 'AI利用不可'."
          fi

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Lint (debug)
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble debug APK
        # GITHUB_RUN_NUMBER feeds into versionCode (see android/version.properties +
        # android/app/build.gradle.kts) so every CI build ships a strictly greater
        # versionCode than the previous one. Without this, Android refuses to
        # upgrade an already-installed APK and Firebase distributes what looks like
        # the same build to testers.
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Resolve versioned APK path
        id: apk
        # Filename is stamped with versionName + versionCode by the build script.
        # We discover it here instead of hardcoding so a single source-of-truth
        # (version.properties) can change versionName without breaking the workflow.
        run: |
          APK_FILE=$(ls app/build/outputs/apk/debug/corechat-v*.apk 2>/dev/null | head -n1)
          if [ -z "${APK_FILE}" ]; then
            echo "::error::No versioned APK produced under app/build/outputs/apk/debug/. Check the assemble step output and android/app/build.gradle.kts output naming."
            ls -la app/build/outputs/apk/debug/ || true
            exit 1
          fi
          APK_NAME=$(basename "${APK_FILE}")
          echo "name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "workspace_path=android/app/build/outputs/apk/debug/${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "Resolved APK: ${APK_NAME}"

      - name: Compose release notes
        id: notes
        env:
          DISPATCH_NOTES: ${{ github.event.inputs.release_notes }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -n "${DISPATCH_NOTES}" ]; then
            NOTES="${DISPATCH_NOTES}"
          else
            SHORT_SHA="${COMMIT_SHA:0:7}"
            NOTES="${SHORT_SHA} ${COMMIT_MSG:-(manual build)}"
          fi
          {
            echo "notes<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.workspace_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload lint report as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: android/app/build/reports/lint-results-debug.html
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # Both groups and testers are optional — preflight already enforces
          # that at least one is set. Unset values become empty strings, which
          # the Firebase CLI treats as "no filter on this dimension".
          groups: ${{ secrets.TESTER_GROUPS }}
          testers: ${{ secrets.TESTERS_EMAILS }}
          file: ${{ steps.apk.outputs.workspace_path }}
          releaseNotes: ${{ steps.notes.outputs.notes }}
